            <area target="" alt="Sytem Fan" 
            title="La refrigeración por aire en computadoras es un método 
para disipar el calor generado por componentes eléctricos (CPU,GPU,…).
Por lo general, el aire caliente es sacado desde el interior del dispositivo
con los ventiladores.

Los ventiladores se utilizan especialmente en las fuentes de poder, ubicadas 
generalmente en la parte trasera del gabinete de la computadora. Actualmente, 
también se incluyen ventiladores adicionales para el microprocesador y 
circuitos que pueden sobrecalentarse. Incluso a veces son usados en distintas
partes del gabinete para una refrigeración general." href="system_fan.html" coords="22,30,86,18,92,24,90,79,123,72,143,103,111,116,82,114,66,117,21,107,30,94" shape="poly">

            <area target="" alt="Floppy" 
            title="El disquete (en inglés diskette) o disco flexible[5]​ es un soporte de 
almacenamiento de datos obsoleto de tipo magnético,[6]​ formado por una
fina lámina circular (disco) de material magnetizable y flexible 
(de ahí su denominación),[5]​ encerrada en una cubierta de plástico,
cuadrada o rectangular, que se utilizaba en la computadora, 
por ejemplo: para disco de arranque, para trasladar datos e 
información de un ordenador a otro, o simplemente para almacenar 
y resguardar archivos." href="floppy.html" coords="122,21,171,10,206,33,217,47,173,58,157,51,145,38" shape="poly">

            <area target="" alt="Heat Sink" 
            title="Hasta los más básicos circuitos a base de semiconductores suelen recalentarse 
(transistores, circuitos integrados, etc.), y por ello, los microprocesadores 
son más propensos aún a este problema. En consecuencia, esto debe ser disminuido
para el buen funcionamiento, de allí el necesario enfriamiento del CPU, que 
consiste en retirar ese excesivo calor del componente electrónico, en este caso 
la CPU. Y cada vez se hace más necesario un sistema de refrigeración más 
eficiente, debido a las altas frecuencias que manejan estos componentes." href="heat_sink.html" coords="261,29,289,7,348,17,341,53,326,60,319,75,294,84,268,66,258,49,261,39" shape="poly">

            <area target="" alt="Hard Drive" 
            title="En informática, unidad de disco duro o unidad de disco rígido 
(en inglés: hard disk drive, HDD) es un dispositivo de almacenamiento 
de datos que emplea un sistema de grabación magnética para almacenar y
recuperar archivos digitales. Se compone de uno o más platos o discos 
rígidos, recubiertos con material magnético y unidos por un mismo eje 
que gira a gran velocidad dentro de una caja metálica sellada. Sobre 
cada plato, y en cada una de sus caras, se sitúa un cabezal de lectura/escritura 
que flota sobre una delgada lámina de aire generada por la rotación de los discos.[1]​ 
Permite el acceso aleatorio a los datos, lo que significa que los bloques de datos se
pueden almacenar o recuperar en cualquier orden y no solo de forma secuencial.
Las unidades de disco duro son un tipo de memoria no volátil, que retienen los 
datos almacenados incluso cuando están apagados." href="hard_drive.html" coords="305,159,347,109,392,131,351,183,333,174" shape="poly">

            <area target="" alt="Optical Drive" 
            title="En informática, unidad de disco duro o unidad de disco rígido 
(en inglés: hard disk drive, HDD) es un dispositivo de almacenamiento 
de datos que emplea un sistema de grabación magnética para almacenar y
recuperar archivos digitales. Se compone de uno o más platos o discos 
rígidos, recubiertos con material magnético y unidos por un mismo eje 
que gira a gran velocidad dentro de una caja metálica sellada. Sobre 
cada plato, y en cada una de sus caras, se sitúa un cabezal de lectura/escritura 
que flota sobre una delgada lámina de aire generada por la rotación de los discos.[1]​ 
Permite el acceso aleatorio a los datos, lo que significa que los bloques de datos se
pueden almacenar o recuperar en cualquier orden y no solo de forma secuencial.
Las unidades de disco duro son un tipo de memoria no volátil, que retienen los 
datos almacenados incluso cuando están apagados." href="optical_drive.html" coords="299,232,340,204,388,215,387,229,357,272,303,248" shape="poly">

            <area target="" alt="RAM Modules" 
            title="Un disco óptico es un medio de almacenamiento de datos de tipo óptico, 
que consiste en un disco circular en el cual la información se codifica, 
guarda y almacena haciendo unos surcos microscópicos con un láser sobre una
de las caras planas que lo componen.

Como todas las formas de los medios de almacenamiento actuales, los discos ópticos se basan 
en la tecnología digital. Cualquier tipo o morfología de la información (texto, imagen, audio, vídeo, etc.)
puede ser codificada en formato digital y almacenada en este tipo de soportes.[1]" href="ram_modules.html" coords="284,325,353,283,379,307,308,360" shape="poly">

            <area target="" alt="CPU" 
            title="La Unidad de Procesamiento Central (conocida por las siglas CPU, del inglés central processing unit) 
o procesador es un componente del hardware dentro de un ordenador, teléfonos inteligentes, y otros 
dispositivos programables.

Su función es interpretar las instrucciones de un programa informático mediante la realización de las operaciones 
básicas aritméticas, lógicas, y externas (procedentes de la unidad de entrada/salida). Su diseño y su 
avance ha variado notablemente desde su creación, aumentando su eficiencia y potencia y reduciendo el consumo de energía y el coste.

Un ordenador puede contener más de una CPU (multiprocesamiento). En la actualidad, los microprocesadores 
están constituidos por un único circuito integrado (chip) aunque existen los procesadores multinúcleo 
(varias CPU en un solo circuito integrado). Un circuito integrado que contiene una CPU también puede contener los dispositivos periféricos
y otros componentes de un sistema informático; similar a un microcontrolador (menos potente en RAM) se le denomina sistema en un chip (SoC)." href="cpu.html" coords="225,318,268,330,253,371,206,354,199,356,193,374,147,353,167,316,208,333" shape="poly">

            <area target="" alt="Motherboard" 
            title="La placa base, también conocida como tarjeta madre, placa madre o placa principal 
(motherboard o mainboard en inglés), es una tarjeta de circuito impreso a la que se
conectan los componentes que constituyen la computadora. En muchos lugares de habla
hispana se usa la palabra inglesa con el artículo en femenino.[1]​[2]​

Es una parte fundamental para montar cualquier computadora personal de escritorio o portátil o algún
dispositivo. Tiene instalados una serie de circuitos integrados, entre los que se encuentra el circuito
integrado auxiliar (chipset), que sirve como centro de conexión entre el microprocesador (CPU), la memoria 
de acceso aleatorio (RAM), las ranuras de expansión y otros dispositivos." href="motherboard.html" coords="127,288,128,387,5,386,7,288" shape="poly">

            <area target="" alt="Power Supply" 
            title="En electrónica, la fuente de alimentación o fuente de potencia es el dispositivo 
que convierte la corriente alterna (CA), en una o varias corrientes continuas (CC),
que alimentan los distintos circuitos del aparato electrónico al que se conecta 
(computadora, televisor, impresora, router, etc).[1]​

En inglés se conoce como power supply unit (PSU), que literalmente traducido significa: unidad de 
fuente de alimentación, refiriéndose a la fuente de energía eléctrica." href="power_supply.html" coords="55,144,96,157,99,182,62,218,25,197,12,190,6,167,34,143,45,144" shape="poly">
